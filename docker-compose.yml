version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: spendlens-db
    environment:
      POSTGRES_DB: spendlens
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d spendlens"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
